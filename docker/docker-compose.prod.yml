# Production-style compose: built static frontend served by nginx,
# backend without --reload, no source mounts.
# Usage: docker compose -f docker/docker-compose.yml -f docker/docker-compose.prod.yml up -d --build

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      - APP_MODE=production
      - LOG_LEVEL=INFO
      - DATABASE_BACKEND=postgresql
      - DEMO_AUTH_OPTIONAL=false
      # Set SECRET_KEY from the server environment or .env file.
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required in production}
      - APP_PUBLIC_URL=${APP_PUBLIC_URL:-http://111.229.172.100}
      - SMTP_HOST=${SMTP_HOST:-localhost}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-no-reply@manufoundry.local}
      - SMTP_TLS=${SMTP_TLS:-true}
    volumes: !override []   # override dev source mount
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports: !override
      - "80:80"
    volumes: !override []
    command: ["nginx", "-g", "daemon off;"]
